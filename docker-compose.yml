services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rpcmas-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_strong_Pass123!' -Q 'SELECT 1' -C -N || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: rpcmas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/RPCMAS.API/Dockerfile
    container_name: rpcmas-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=RPCMAS;User=sa;Password=Your_strong_Pass123!;TrustServerCertificate=True;Encrypt=False"
      Redis__Connection: "redis:6379"
    ports:
      - "5080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy

  blazor:
    build:
      context: .
      dockerfile: src/RPCMAS.Blazor/Dockerfile
    container_name: rpcmas-blazor
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApiBaseUrl: "http://api:8080"
    ports:
      - "5090:8080"
    depends_on:
      - api

volumes:
  mssql_data:
  redis_data:
